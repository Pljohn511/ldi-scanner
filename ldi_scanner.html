<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LDI Job Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; background: #1a365d; padding: 14px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 3px solid #c2410c; }
  header .logo { font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #fff; }
  header .sub { font-size: 11px; color: #93c5fd; letter-spacing: 1px; text-transform: uppercase; }
  .main { width: 100%; max-width: 480px; padding: 24px 16px; display: flex; flex-direction: column; gap: 20px; }
  .config-panel { background: #1e293b; border-radius: 12px; padding: 16px; border: 1px solid #334155; }
  .config-panel label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px; }
  .config-panel input { width: 100%; background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 10px 12px; color: #f1f5f9; font-size: 13px; font-family: monospace; }
  .config-panel input:focus { outline: none; border-color: #3b82f6; }
  .tech-row { display: flex; gap: 8px; margin-top: 12px; }
  .tech-row > div { flex: 1; }
  .scanner-box { background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; position: relative; }
  #viewport { width: 100%; height: 260px; position: relative; background: #000; }
  #viewport video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  .scan-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; z-index: 10; }
  .scan-frame { width: 80%; height: 80px; border: 2px solid #f97316; border-radius: 6px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); }
  .scanner-idle { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 40px 20px; height: 260px; }
  .scanner-idle p { color: #64748b; font-size: 14px; text-align: center; }
  .scan-btn { width: 100%; padding: 16px; background: #c2410c; color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: background 0.15s; }
  .scan-btn:hover { background: #9a3412; }
  .stop-btn { background: #1e293b; color: #94a3b8; border-top: 1px solid #334155; font-size: 13px; padding: 10px; }
  .result-card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; display: none; }
  .result-card.visible { display: block; }
  .result-header { padding: 14px 16px; background: #0f172a; border-bottom: 1px solid #334155; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
  .result-body { padding: 16px; }
  .result-field { margin-bottom: 12px; }
  .result-field .field-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .result-field .field-value { font-size: 15px; font-weight: 600; color: #f1f5f9; }
  .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .badge-ready { background: #166534; color: #bbf7d0; }
  .badge-pending { background: #92400e; color: #fde68a; }
  .badge-complete { background: #1e3a5f; color: #93c5fd; }
  .badge-other { background: #374151; color: #d1d5db; }
  .confirm-btn { width: 100%; padding: 16px; background: #15803d; color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; margin-top: 16px; border-radius: 8px; transition: background 0.15s; }
  .confirm-btn:hover { background: #166534; }
  .confirm-btn:disabled { background: #374151; cursor: not-allowed; }
  .status-msg { text-align: center; padding: 14px; border-radius: 10px; font-size: 14px; font-weight: 600; display: none; }
  .status-msg.visible { display: block; }
  .status-msg.success { background: #14532d; color: #bbf7d0; border: 1px solid #16a34a; }
  .status-msg.error { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
  .status-msg.info { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
</style>
</head>
<body onload="loadSaved()">

<header>
  <div>
    <div class="logo">LDI</div>
    <div class="sub">Job Scanner</div>
  </div>
</header>

<div class="main">

  <div class="config-panel">
    <label>Airtable PAT Token</label>
    <input type="password" id="patInput" placeholder="paste token here..." />
    <div class="tech-row">
      <div>
        <label style="margin-top:12px">Tech Name</label>
        <input type="text" id="techInput" placeholder="e.g. Jose" />
      </div>
    </div>
  </div>

  <div class="scanner-box">
    <div id="viewport">
      <div class="scanner-idle" id="idleMsg">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" style="opacity:0.3">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h2v2h-2zM18 14h3M14 18h2M18 18h3v3M21 14v2"/>
        </svg>
        <p>Tap "Start Scan" to activate camera</p>
      </div>
      <div class="scan-overlay" id="scanOverlay" style="display:none">
        <div class="scan-frame"></div>
      </div>
    </div>
    <button class="scan-btn" id="startBtn" onclick="startScan()">▶ Start Scan</button>
    <button class="scan-btn stop-btn" id="stopBtn" style="display:none" onclick="stopScan()">✕ Cancel</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">Scanned Job</div>
    <div class="result-body">
      <div class="result-field">
        <div class="field-label">Job Reference</div>
        <div class="field-value" id="rJobRef">—</div>
      </div>
      <div class="result-field">
        <div class="field-label">Item</div>
        <div class="field-value" id="rItem">—</div>
      </div>
      <div class="result-field">
        <div class="field-label">Current Status</div>
        <div class="field-value" id="rStatus">—</div>
      </div>
      <div class="result-field">
        <div class="field-label">Assigned Date</div>
        <div class="field-value" id="rDate">—</div>
      </div>
      <button class="confirm-btn" id="confirmBtn" onclick="markComplete()">✓ Mark as Complete</button>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

</div>

<script>
const BASE_ID = 'appgrbd9I6SX3D3yQ';
const TABLE   = 'LDI%20Production';
let currentRecordId = null;
let codeReader = null;

function getToken() { return document.getElementById('patInput').value.trim(); }
function getTech()  { return document.getElementById('techInput').value.trim() || 'Unknown'; }

function loadSaved() {
  const pat = localStorage.getItem('ldi_pat');
  const tech = localStorage.getItem('ldi_tech');
  if (pat) document.getElementById('patInput').value = pat;
  if (tech) document.getElementById('techInput').value = tech;
}

function saveCreds() {
  localStorage.setItem('ldi_pat', document.getElementById('patInput').value.trim());
  localStorage.setItem('ldi_tech', document.getElementById('techInput').value.trim());
}
function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = `status-msg visible ${type}`;
}

function hideStatus() {
  document.getElementById('statusMsg').className = 'status-msg';
}

async function startScan() {
  if (!getToken()) { showStatus('Please enter your Airtable PAT token first.', 'error'); return; }
  saveCreds();

  document.getElementById('idleMsg').style.display = 'none';
  document.getElementById('scanOverlay').style.display = 'flex';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  document.getElementById('resultCard').className = 'result-card';
  hideStatus();

  try {
    codeReader = new ZXing.BrowserBarcodeReader();
    const videoEl = document.createElement('video');
    videoEl.setAttribute('playsinline', true);
    document.getElementById('viewport').appendChild(videoEl);

    await codeReader.decodeFromConstraints(
      { video: { facingMode: 'environment' } },
      videoEl,
      (result, err) => {
        if (result) {
          const code = result.getText();
          onBarcodeDetected(code);
        }
      }
    );
  } catch(e) {
    showStatus('Camera error: ' + e.message, 'error');
    stopScan();
  }
}

function stopScan() {
  if (codeReader) { codeReader.reset(); codeReader = null; }
  const video = document.querySelector('#viewport video');
  if (video) video.remove();
  document.getElementById('idleMsg').style.display = 'flex';
  document.getElementById('scanOverlay').style.display = 'none';
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
}

async function onBarcodeDetected(code) {
  if (!code.startsWith('rec') || code.length !== 20) return;
  stopScan();
  showStatus(`Detected: ${code} — looking up…`, 'info');

  const token = getToken();
  const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}/${code}`;

  try {
    const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!resp.ok) { showStatus('Airtable error: ' + resp.status, 'error'); return; }
    const rec = await resp.json();

    if (!rec.id) {
      showStatus(`No record found for: ${code}`, 'error'); return;
    }

    currentRecordId = rec.id;
    const f = rec.fields;

    document.getElementById('rJobRef').textContent = f['Job Ref'] || code;
    document.getElementById('rItem').textContent   = f['Item Name'] || '—';
    document.getElementById('rDate').textContent   = f['Assigned Date'] || '—';

    const status = f['Status'] || 'Unknown';
    const badgeClass = status === 'Ready' ? 'badge-ready'
                     : status === 'Pending' ? 'badge-pending'
                     : status === 'Completed' ? 'badge-complete' : 'badge-other';
    document.getElementById('rStatus').innerHTML =
      `<span class="status-badge ${badgeClass}">${status}</span>`;

    const confirmBtn = document.getElementById('confirmBtn');
    if (status === 'Completed') {
      confirmBtn.textContent = '✓ Already Complete';
      confirmBtn.disabled = true;
    } else {
      confirmBtn.textContent = '✓ Mark as Complete';
      confirmBtn.disabled = false;
    }

    document.getElementById('resultCard').className = 'result-card visible';
    hideStatus();

  } catch(e) {
    showStatus('Network error: ' + e.message, 'error');
  }
}

async function markComplete() {
  if (!currentRecordId) return;
  const token = getToken();
  const tech = getTech();
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = 'Updating…';
  showStatus('Marking as Complete…', 'info');

  const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}/${currentRecordId}`;
  try {
    const resp = await fetch(url, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: { Status: 'Completed', 'Assigned Tech': tech } })
    });

    if (!resp.ok) {
      const err = await resp.json();
      showStatus('Update failed: ' + JSON.stringify(err.error), 'error');
      btn.disabled = false; btn.textContent = '✓ Mark as Complete';
      return;
    }

    showStatus('✓ Job marked Complete!', 'success');
    btn.textContent = '✓ Marked Complete';
    document.getElementById('rStatus').innerHTML =
      `<span class="status-badge badge-complete">Completed</span>`;

  } catch(e) {
    showStatus('Network error: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '✓ Mark as Complete';
  }
}
</script>
</body>
</html>
